services:

  mastra:
    image: ghcr.io/ernestofgaia/ai-tutoring-website-mastra:latest
    container_name: ernestofgaia_mastra
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - NODE_ENV=production
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
      - GOOGLE_TIMEZONE=${GOOGLE_TIMEZONE:-America/Los_Angeles}
      # Shared secret guarding the deterministic OCHI lead-intake route.
      - OCHI_BOOKING_SECRET=${OCHI_BOOKING_SECRET}
    volumes:
      # Persists brain.json, mastra.db, mastra.duckdb, agentic-brain-cache/
      # Isolated to /app/data so compiled code in /app/.mastra/output/ is not shadowed
      - mastra-data:/app/data
    networks:
      - nginx-proxy

  frontend:
    image: ghcr.io/ernestofgaia/ai-tutoring-website:latest
    container_name: ernestofgaia_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Both services are on nginx-proxy network — use service name as hostname
      - MASTRA_URL=http://mastra:4111
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Same secret as the mastra service — validated at the public edge
      # (frontend/app/api/ochi-booking) before forwarding to Mastra.
      - OCHI_BOOKING_SECRET=${OCHI_BOOKING_SECRET}
    networks:
      - nginx-proxy
    depends_on:
      - mastra

networks:
  # Shared with Nginx Proxy Manager — NPM routes ernestofgaia.xyz → ernestofgaia-frontend:3000
  nginx-proxy:
    external: true

volumes:
  mastra-data:
    name: ernestofgaia-mastra-data
